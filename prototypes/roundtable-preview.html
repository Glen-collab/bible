<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Footsteps — Round Table (preview)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Spline+Sans:wght@400;500;600&display=swap');
  :root{--parch:#f4ead3;--parch-deep:#e8d8b0;--ink:#3a2c1a;--ink-soft:#6b563a;--olive:#6b7a3f;--olive-deep:#4d5a2b;--terra:#b5532a;--terra-deep:#8a3d1d;--gold:#c79a3a;--sky:#8fb0c4;--shadow:rgba(58,44,26,.18);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Spline Sans',sans-serif;background:radial-gradient(ellipse at 50% 0%,#fbf3df 0%,var(--parch) 45%,var(--parch-deep) 100%);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 40px;}
  #app{width:100%;max-width:520px;}
  header{text-align:center;padding:22px 0 6px;}
  .kicker{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--terra);font-weight:600;}
  h1{font-family:'Fraunces';font-weight:600;font-size:27px;margin-top:6px;}h1 em{font-style:italic;color:var(--olive-deep);}
  .card{background:linear-gradient(180deg,#fdf8ec,#f6ecd4);border:1px solid var(--parch-deep);border-radius:18px;padding:22px 20px 24px;box-shadow:0 10px 30px -12px var(--shadow),inset 0 1px 0 #fff;position:relative;animation:rise .45s cubic-bezier(.2,.8,.2,1);}
  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .blurb{font-size:14.5px;line-height:1.6;color:var(--ink-soft);}
  .blurb b{color:var(--ink);}
  .notalone{margin:14px 0;padding:12px 14px;background:rgba(143,176,196,.16);border-left:3px solid var(--sky);border-radius:0 12px 12px 0;font-family:'Fraunces';font-style:italic;font-size:14.5px;color:var(--olive-deep);}
  .pnote{margin-top:14px;padding:11px 13px;border:1.5px dashed var(--gold);border-radius:12px;font-size:12.5px;line-height:1.5;color:var(--ink-soft);background:rgba(199,154,58,.08);}
  .pnote b{color:var(--terra-deep);}
  .dots{display:flex;justify-content:center;gap:7px;margin:16px 0 4px;}
  .dots .d{width:8px;height:8px;border-radius:50%;background:var(--parch-deep);border:1.5px solid var(--ink-soft);opacity:.5;transition:.3s;}
  .dots .d.on{background:var(--gold);border-color:var(--terra-deep);opacity:1;transform:scale(1.3);}
  .dots .d.done{background:var(--olive);border-color:var(--olive-deep);opacity:1;}
  .prompt{text-align:center;padding:8px 4px 4px;}
  .who{display:inline-block;font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;padding:5px 12px;border-radius:20px;margin-bottom:14px;}
  .who.kid{background:rgba(107,122,63,.16);color:var(--olive-deep);}
  .who.parent{background:rgba(181,83,42,.14);color:var(--terra-deep);}
  .who.together{background:rgba(199,154,58,.18);color:#8a6a1e;}
  .face{font-size:46px;margin:2px 0 12px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.18));}
  .q{font-family:'Fraunces';font-size:21px;line-height:1.35;color:var(--ink);}
  .hint{font-size:13px;color:var(--ink-soft);margin-top:12px;line-height:1.5;}
  .hint b{color:var(--olive-deep);}
  .nav{display:flex;gap:10px;margin-top:20px;}
  .btn{flex:1;padding:14px;border:none;border-radius:13px;cursor:pointer;font-family:'Spline Sans';font-size:15px;font-weight:600;background:linear-gradient(180deg,var(--terra),var(--terra-deep));color:#fff;box-shadow:0 4px 0 #6e2f14;transition:transform .12s,box-shadow .12s;}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #6e2f14;}
  .btn.olive{background:linear-gradient(180deg,var(--olive),var(--olive-deep));box-shadow:0 4px 0 #39431f;}
  .btn.ghost{flex:0 0 auto;background:none;color:var(--ink-soft);box-shadow:none;border:1.5px solid var(--parch-deep);padding:14px 18px;}
  .btn.ghost:active{transform:translateY(2px);}
  .badge{text-align:center;margin:6px 0 2px;}
  .badge .bi{font-size:54px;animation:pop .5s;}
  @keyframes pop{0%{transform:scale(.4);opacity:0;}60%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
  .badge .bn{font-family:'Fraunces';font-size:18px;color:var(--olive-deep);margin-top:6px;}
  footer{text-align:center;font-size:11px;color:var(--ink-soft);opacity:.7;margin-top:16px;}
</style>
</head>
<body>
<div id="app">
  <header><div class="kicker">Round Table · Case One</div><h1>Talk it <em>over</em></h1></header>
  <div id="screen"></div>
  <footer>Footsteps of the Teacher · Round Table concept (Patience &amp; Trust)</footer>
</div>

<script>
/* This content would live as a `roundtable` block on each CASE (data-driven).
   Each slot has a POOL of on-theme prompts; one is picked at random each visit,
   avoiding an immediate repeat. Structure stays fixed (kid -> grown-up -> together),
   the specific questions vary. "Random, but focused." */
const RT = {
  theme: "Patience & Trust",
  intro: "The story you just walked was about <b>patience</b>. Before you build the manger scene in code, take a few minutes together — no tapping through fast, just talk.",
  varyNote: "🎲 The questions change each time — so you can come back to this table again and again.",
  notAlone: [
    "Here's a secret: almost every grown-up still finds waiting hard, too. You're in good company.",
    "Even the oldest, wisest people you know still wrestle with waiting. You're not the only one.",
    "Waiting is hard for just about everybody — that's part of being human, not a problem with you.",
  ],
  parentNote: "<b>Grown-ups:</b> kids share the most when <b>you go first</b> and are honest about your own struggles. There are no wrong answers here.",
  slots: [
    { who:"kid", label:"For you", face:"🧒", pool:[
      { q:"What's something you really <i>don't</i> want to wait for right now?", hint:"Big or small — a birthday, a turn, growing up. Say why the waiting is hard." },
      { q:"When is waiting the <i>hardest</i> for you — in the car, in line, for a special day?", hint:"What does the waiting feel like in your body?" },
      { q:"Has waiting for something ever made it feel <i>even better</i> when it finally came?", hint:"Think of a time the wait was worth it." },
      { q:"What helps you when you have to wait and it's really hard?", hint:"A trick, a person, a thought — what actually works for you?" },
      { q:"Is there something you're waiting for that you don't understand — that you just have to <i>trust</i> will be okay?", hint:"It's okay not to know how it ends yet." },
    ]},
    { who:"parent", label:"For your grown-up", face:"🧑", pool:[
      { q:"When you were about this age, what's the hardest thing <i>you</i> ever had to wait for? How did it turn out?", hint:"<b>Go first.</b> A real story from your childhood means more than any lesson." },
      { q:"Was there a time as a kid you wanted something <i>now</i>, but waiting turned out better? Tell the story.", hint:"Let them see you were once their age." },
      { q:"What's something you waited a long time for as a kid — and was it worth it?", hint:"The longer the wait, the better the story." },
      { q:"When you were little, who helped you learn to be patient, and how?", hint:"Naming your own helpers shows kids who to lean on." },
      { q:"Was there a time you rushed something as a kid and wished you'd waited? What happened?", hint:"Admitting a mistake makes it safe for them to admit theirs." },
    ]},
    { who:"together", label:"Together", face:"🤝", pool:[
      { q:"Pick <i>one</i> thing this week you'll both be patient about — and check in on it later.", hint:"Say it out loud so you can remember it together." },
      { q:"Think of something you're both waiting for. How can you help <i>each other</i> wait well?", hint:"Waiting is easier with someone." },
      { q:"Name a 'waiting moment' that happens a lot in your week. What could make it easier for both of you?", hint:"Small plans beat big promises." },
      { q:"Choose something worth waiting for, and make a little plan for the wait together.", hint:"A shared goal turns waiting into teamwork." },
    ]},
  ],
  badge: { icon:"🫖", name:"Round Table" },
  done: "You talked it over — and that conversation is part of the story now, too. When you're ready, take up the pen and build the scene in code."
};

const screen = document.getElementById('screen');
let step = -1, cur = null, lastPick = {};

function pick(pool, key){
  if(pool.length <= 1) return pool[0];
  let idx, guard=0;
  do { idx = Math.floor(Math.random()*pool.length); guard++; } while(idx === lastPick[key] && guard < 20);
  lastPick[key] = idx;
  return pool[idx];
}
function newSession(){
  cur = {
    notAlone: pick(RT.notAlone, 'na'),
    prompts: RT.slots.map((s,i)=>{ const p = pick(s.pool, 's'+i); return { who:s.who, label:s.label, face:s.face, q:p.q, hint:p.hint }; }),
  };
}
function dots(active){
  let h='<div class="dots">';
  for(let i=0;i<cur.prompts.length;i++){ let c=i<active?'done':i===active?'on':''; h+=`<span class="d ${c}"></span>`; }
  return h+'</div>';
}
function renderIntro(){
  step=-1; newSession();
  screen.innerHTML=`<div class="card">
    <p class="blurb">${RT.intro}</p>
    <div class="notalone">${cur.notAlone}</div>
    <div class="pnote">${RT.parentNote}</div>
    <p class="hint" style="text-align:center;margin-top:14px">${RT.varyNote}</p>
    <div class="nav"><button class="btn" onclick="go(0)">Start the round table →</button></div>
  </div>`;
}
function renderPrompt(i){
  step=i;
  const p=cur.prompts[i];
  const last=i===cur.prompts.length-1;
  screen.innerHTML=dots(i)+`<div class="card">
    <div class="prompt">
      <span class="who ${p.who}">${p.label}</span>
      <div class="face">${p.face}</div>
      <div class="q">${p.q}</div>
      <div class="hint">${p.hint}</div>
    </div>
    <div class="nav">
      <button class="btn ghost" onclick="go(${i-1})">←</button>
      <button class="btn ${last?'olive':''}" onclick="go(${i+1})">${last?'We talked it over ✓':'Next →'}</button>
    </div>
  </div>`;
}
function renderDone(){
  screen.innerHTML=dots(cur.prompts.length)+`<div class="card" style="text-align:center">
    <div class="badge"><div class="bi">${RT.badge.icon}</div><div class="bn">${RT.badge.name}</div></div>
    <p class="blurb" style="margin-top:10px">${RT.done}</p>
    <div class="nav"><button class="btn olive" onclick="alert('(In the app, this opens the coding Workshop.)')">Take up the pen — build the scene →</button></div>
    <div class="nav"><button class="btn ghost" style="flex:1" onclick="renderIntro()">↻ Start over</button></div>
  </div>`;
}
function go(i){
  if(i<0){ renderIntro(); return; }
  if(i>=cur.prompts.length){ renderDone(); return; }
  renderPrompt(i);
}
renderIntro();
</script>
</body>
</html>
